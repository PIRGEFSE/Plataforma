# =============================================================
# docker-compose.prod.yml — PIRGEFSE Producción
# Servidor: 192.141.169.15 | Dominio: pirgefse.cl
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   docker compose -f docker-compose.prod.yml --env-file .env.production down
#   docker compose -f docker-compose.prod.yml --env-file .env.production logs -f
# =============================================================

services:
  db:
    image: postgres:16
    container_name: pirgefse_db
    restart: always
    env_file: .env.production
    # Puerto 5432 NO expuesto al host — solo accesible dentro de pirgefse_net
    # Acceso admin: docker compose exec db psql -U pirgefse -d pirgefse_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 1g
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c max_parallel_workers_per_gather=2
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c default_statistics_target=200
        -c log_min_duration_statement=1000
        -c log_connections=off
        -c log_disconnections=off
    networks:
      - pirgefse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pirgefse_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: https://pirgefse.cl
    # Puerto 8000 solo accesible desde localhost (Nginx hace proxy)
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pirgefse_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: pirgefse_frontend
    restart: always
    # Puerto 80 solo accesible desde localhost (Nginx hace proxy)
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - pirgefse_net

  # ⚠️ dbgate NO incluido en producción
  # Para administración usar: docker compose exec db psql -U pirgefse -d pirgefse_db

volumes:
  pgdata:
    driver: local

networks:
  pirgefse_net:
    driver: bridge
